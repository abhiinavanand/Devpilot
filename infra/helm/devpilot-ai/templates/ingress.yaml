apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devpilot-ai-ingress
spec:
  rules:
    - host: devpilot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devpilot-ai-gateway
                port:
                  number: 3000
