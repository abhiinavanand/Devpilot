global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:3000
          - host.docker.internal:3000

  - job_name: devpilot-vercel
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - devpilot-ai-blush.vercel.app
