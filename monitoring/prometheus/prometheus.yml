global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3000

  - job_name: project-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3002

  - job_name: analytics-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3003
